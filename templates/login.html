<!DOCTYPE html>
<html>

<head>
    <title>Login - EchoTime</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="form-container">

    <h1>Welcome Back</h1>

    <p style="margin-bottom:20px;">
        Login to access your future capsules
    </p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <p>
        Don't have an account?
        <a href="/signup">Create one</a>
    </p>

</div>

</body>

</html>
