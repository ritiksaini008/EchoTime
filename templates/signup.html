<!DOCTYPE html>
<html>

<head>
    <title>Signup - EchoTime</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="form-container">

    <h1>Create Account</h1>

    <p style="margin-bottom:20px;">
        Start sending messages to your future self
    </p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Choose Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Choose Password"
            required>

        <br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>

</html>
